<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劳动报酬计算器</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        .input-group, .result-group, .process-group { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        
        /* 输入部分样式 */
        .inputs-flex { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .input-item { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="number"], input[type="range"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .range-container { display: flex; align-items: center; gap: 10px; }
        .range-value { font-weight: bold; width: 30px; text-align: right; color: #1a73e8;}

        /* 结果展示样式 */
        .salary-display { font-size: 36px; font-weight: bold; color: #2e7d32; text-align: center; margin-top: 10px; }
        .stat-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .stat-item { background: #f0f4f8; padding: 10px 20px; border-radius: 5px; border-left: 4px solid #1a73e8; font-size: 14px; color: #555; }
        .stat-label { font-weight: bold; margin-bottom: 5px; display: block; }
        .lost-day { border-left-color: #d32f2f; color: #d32f2f; }
        
        /* 计算过程样式 */
        .process-list { list-style: decimal; padding-left: 30px; line-height: 1.8; color: #666; font-size: 15px; }
        .math { font-family: monospace; }
        .highlight { color: #1a73e8; font-weight: bold; }
        .source-note { font-style: italic; color: #777; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>劳动报酬计算工具</h1>

    <div class="input-group">
        <h2>1. 输入信息</h2>
        <div class="inputs-flex">
            <div class="input-item">
                <label for="inputYear">年份</label>
                <select id="inputYear">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>
            <div class="input-item">
                <label for="inputMonth">月份</label>
                <select id="inputMonth">
                    <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                    <option value="4" selected>4月</option><option value="5">5月</option><option value="6">6月</option>
                    <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
                    <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
                </select>
            </div>
            <div class="input-item">
                <label for="leaveDays">请假天数</label>
                <div class="range-container">
                    <input type="range" id="leaveDays" min="0" max="10" value="1" step="1">
                    <span class="range-value" id="leaveDaysVal">1</span>
                </div>
            </div>
            <div class="input-item">
                <label for="baseCompensation">基本劳务报酬 (元)</label>
                <input type="number" id="baseCompensation" value="4000" min="0">
            </div>
        </div>
    </div>

    <div class="result-group">
        <h2>2. 结果展示</h2>
        <p class="salary-display" id="finalSalary">0.00 元</p>
        <ul class="stat-list">
            <li class="stat-item"><span class="stat-label">当月法定工作日</span><span id="statWorkDays">0</span> 天</li>
            <li class="stat-item"><span class="stat-label">实际出勤天数</span><span id="statAttendDays">0</span> 天</li>
            <li class="stat-item"><span class="stat-label">税前所得 (劳务报酬)</span><span id="statGross">0.00</span> 元</li>
            <li class="stat-item"><span class="stat-label">劳务税</span><span id="statTax">0.00</span> 元</li>
        </ul>
        <ul class="stat-list">
            <li class="stat-item lost-day"><span class="stat-label">请假一天损失 (基本报酬扣除)</span><span id="statLossPerDayBase">0.00</span> 元</li>
            <li class="stat-item lost-day"><span class="stat-label">请假一天实际减少所得 (含税收影响)</span><span id="statLossPerDayActual">0.00</span> 元</li>
        </ul>
    </div>

    <div class="process-group">
        <h2>3. 计算过程分解</h2>
        <ul class="process-list" id="processDetails"></ul>
        <p class="source-note">*税率说明：当所得额 ≤ 4000元采用规则：(劳务报酬-800) × 20%；> 4000元采用标准劳务报酬税率：劳务报酬 × (1-20%) × 20%。</p>
    </div>

</div>

<script>
    const inputs = {
        year: document.getElementById('inputYear'),
        month: document.getElementById('inputMonth'),
        leaveDays: document.getElementById('leaveDays'),
        baseComp: document.getElementById('baseCompensation')
    };

    const outputs = {
        finalSalary: document.getElementById('finalSalary'),
        statWorkDays: document.getElementById('statWorkDays'),
        statAttendDays: document.getElementById('statAttendDays'),
        statGross: document.getElementById('statGross'),
        statTax: document.getElementById('statTax'),
        statLossPerDayBase: document.getElementById('statLossPerDayBase'),
        statLossPerDayActual: document.getElementById('statLossPerDayActual'),
        process: document.getElementById('processDetails'),
        leaveDaysVal: document.getElementById('leaveDaysVal')
    };

    // 简单的中国法定工作日计算函数 (基于通用双休规则)
    function getWorkDays(year, month) {
        let totalDays = new Date(year, month, 0).getDate();
        let workDays = 0;
        for (let day = 1; day <= totalDays; day++) {
            let date = new Date(year, month - 1, day);
            let dayOfWeek = date.getDay(); // 0: 周日, 6: 周六
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                workDays++;
            }
        }
        return workDays;
    }

    // 核心计算逻辑
    function calculateSalary(params) {
        const { base, workDays, leaveDays } = params;
        const attendDays = Math.max(0, workDays - leaveDays);

        // A. 税前折算
        const grossSalary = (attendDays / workDays) * base;
        const taxableIncome = grossSalary;

        // B. 劳务税计算
        let tax = 0;
        let taxRuleUsed = '';
        
        if (taxableIncome <= 800) {
            tax = 0;
            taxRuleUsed = '所得 ≤ 800元 免税';
        } else if (taxableIncome > 800 && taxableIncome <= 4000) {
            tax = (taxableIncome - 800) * 0.20;
            taxRuleUsed = '(劳务报酬 - 800) × 20%';
        } else {
            // 超过4000元，采用标准计税 (扣除20%费用后，按20%税率)
            tax = (taxableIncome * 0.8) * 0.20;
            taxRuleUsed = '劳务报酬 × (1-20%) × 20%';
        }

        // C. 最终到账
        const finalSalary = grossSalary - tax;

        // 额外的请假损失分析
        const baseDayRate = base / workDays;
        
        // 计算多请假一天导致的实际收入减少
        const paramsMoreLeave = { ...params, leaveDays: leaveDays + 1 };
        const paramsMoreLeaveResults = calculateSalarySimple(paramsMoreLeave);
        const actualLossPerDay = paramsMoreLeaveResults > 0 ? (finalSalary - paramsMoreLeaveResults) : finalSalary;

        return {
            attendDays, grossSalary, taxableIncome, tax, taxRuleUsed, finalSalary, baseDayRate, actualLossPerDay
        };
    }
    
    // 用于内部损失计算的简化版本
    function calculateSalarySimple(params) {
        const { base, workDays, leaveDays } = params;
        const attendDays = Math.max(0, workDays - leaveDays);
        if(attendDays < 0) return 0;
        const grossSalary = (attendDays / workDays) * base;
        let tax = 0;
        if (grossSalary <= 800) tax = 0;
        else if (grossSalary > 800 && grossSalary <= 4000) tax = (grossSalary - 800) * 0.20;
        else tax = (grossSalary * 0.8) * 0.20;
        return grossSalary - tax;
    }

    // UI 更新和计算过程展示
    function updateUI() {
        const year = parseInt(inputs.year.value);
        const month = parseInt(inputs.month.value);
        const leaveDays = parseInt(inputs.leaveDays.value);
        const base = parseFloat(inputs.baseComp.value) || 0;

        const workDays = getWorkDays(year, month);
        inputs.leaveDays.max = workDays; // 动态更新最大请假天数
        
        // 防止请假天数超过当月工作日
        const validLeaveDays = Math.min(leaveDays, workDays);
        if (leaveDays !== validLeaveDays) {
            inputs.leaveDays.value = validLeaveDays;
        }
        outputs.leaveDaysVal.textContent = validLeaveDays;

        const results = calculateSalary({ base, workDays, leaveDays: validLeaveDays });

        // 更新结果展示
        outputs.finalSalary.textContent = results.finalSalary.toFixed(2) + ' 元';
        outputs.statWorkDays.textContent = workDays;
        outputs.statAttendDays.textContent = results.attendDays;
        outputs.statGross.textContent = results.grossSalary.toFixed(2);
        outputs.statTax.textContent = results.tax.toFixed(2);
        
        outputs.statLossPerDayBase.textContent = results.baseDayRate.toFixed(2);
        outputs.statLossPerDayActual.textContent = results.actualLossPerDay.toFixed(2);

        // 更新计算过程分解
        outputs.process.innerHTML = `
            <li>当月工作日: <span class="highlight">${workDays}</span> 天。</li>
            <li>请假 <span class="highlight">${validLeaveDays}</span> 天，正常出勤 <span class="highlight">${results.attendDays}</span> 天。</li>
            <li>税前报酬 (按出勤比例折算): <span class="math">${results.attendDays} &divide; ${workDays} &times; ${base.toFixed(2)} = <span class="highlight">${results.grossSalary.toFixed(2)}</span></span> 元。</li>
            <li>劳务税计算 (${results.taxRuleUsed}): <span class="highlight">${results.tax.toFixed(2)}</span> 元。</li>
            <li>最终到账工资: <span class="math">${results.grossSalary.toFixed(2)} - ${results.tax.toFixed(2)} = <span class="highlight">${results.finalSalary.toFixed(2)}</span></span> 元。</li>
        `;
    }

    // 初始化和绑定事件
    document.addEventListener('DOMContentLoaded', () => {
        Object.values(inputs).forEach(input => input.addEventListener('input', updateUI));
        updateUI();
    });

</script>
</body>
</html>
