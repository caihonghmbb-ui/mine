<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博生肖测试 - 非正常人类鉴定器</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ff4757;
            font-size: 28px;
        }
        p.subtitle {
            color: #747d8c;
            margin-bottom: 30px;
        }
        .question-box {
            display: none;
            text-align: left;
        }
        .question-box.active {
            display: block;
        }
        .question-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2f3542;
        }
        .option {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #f1f2f6;
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        .option:hover {
            background: #dfe4ea;
            border-color: #ff4757;
        }
        #result-box {
            display: none;
        }
        .animal-icon {
            font-size: 80px;
            margin: 20px 0;
        }
        .animal-name {
            font-size: 32px;
            font-weight: bold;
            color: #ff4757;
            margin-bottom: 10px;
        }
        .animal-desc {
            font-size: 18px;
            line-height: 1.6;
            color: #57606f;
        }
        button.restart-btn {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button.restart-btn:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="intro-box">
        <h1>赛博十二生肖测试</h1>
        <p class="subtitle">仅需10题，测出你隐藏在人类皮囊下的真实（搞怪）生肖属性。</p>
        <button class="restart-btn" onclick="startTest()">开始接受灵魂拷问</button>
    </div>

    <div id="quiz-container">
        </div>

    <div id="result-box">
        <h2>你的赛博生肖是：</h2>
        <div class="animal-icon" id="res-icon">🐒</div>
        <div class="animal-name" id="res-name">暴躁吗喽</div>
        <div class="animal-desc" id="res-desc">简介加载中...</div>
        <button class="restart-btn" onclick="location.reload()">不准！我要重新投胎</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. 走在路上突然被一只鸽子挡住了去路，你会？", options: ["假装自己是一座雕像", "和它进行一段即兴街舞 Battle"] },
        { q: "2. 如果把你变成一种蔬菜，你会是？", options: ["一颗情绪不稳定的土豆", "一朵思考宇宙的西兰花"] },
        { q: "3. 电脑突然卡死且没保存，你会？", options: ["双手合十，祈求赛博佛祖", "抄起水杯，准备物理超度主机"] },
        { q: "4. 你理想中的周末状态是？", options: ["在床上进行光合作用", "在网上高强度“友好交流”"] },
        { q: "5. 吃自助餐的核心战略？", options: ["专挑贵的，吃垮老板", "猛炫十盘蛋炒饭"] },
        { q: "6. 希望获得的废柴超能力？", options: ["绝对没人时才能隐身", "能听懂狗骂你的话"] },
        { q: "7. 在公共场合平地摔，为了缓解尴尬你会？", options: ["就地做二十个俯卧撑", "眼睛一闭，安详装死"] },
        { q: "8. 你的日常睡眠状况像什么？", options: ["半夜两点还在刷手机的吸血鬼", "闹钟响了十八次还在冬眠的熊"] },
        { q: "9. 面对突如其来的焦虑，你会？", options: ["咽下去，化作吃夜宵的动力", "熟练地传递给下一个倒霉蛋朋友"] },
        { q: "10. 你最喜欢的“人类高质量饮品”是？", options: ["82年的冰镇无糖可乐", "前任流下的不甘的泪水"] }
    ];

    const results = [
        { icon: "🐁", name: "赛博仓鼠", desc: "手机里囤积了三万个表情包，但聊天永远只发“哈哈哈”。网络上重拳出击，现实里唯唯诺诺。" },
        { icon: "🐂", name: "纯爱牛马", desc: "终极打工人！坚信努力就能成功，实际上只帮老板换了辆法拉利。看修驴蹄子视频都能感动哭。" },
        { icon: "🐅", name: "键盘猛虎", desc: "游戏里是指挥千军万马的暴躁老哥，现实里去买奶茶连说“去冰半糖”都紧张得结巴。" },
        { icon: "🐇", name: "狂暴流氓兔", desc: "外表人畜无害，内心有个小本本记下了所有人。驱动你活下去的动力是奶茶和无差别怨气。" },
        { icon: "🐉", name: "精神小龙", desc: "中二病晚期。总觉得体内封印着神秘力量，实际上唯一的超能力是把电竞椅坐出腰间盘突出。" },
        { icon: "🐍", name: "阴阳怪气蛇", desc: "语言艺术大师，最擅长回复“啊对对对”。能在聚会开始前5分钟，编出全宇宙最合理的理由放鸽子。" },
        { icon: "🐎", name: "脱缰野马", desc: "混沌能量制造机。一天能冒出10个创业想法，0个落地。讲笑话时别人没笑，自己先笑得喘不过气。" },
        { icon: "🐐", name: "纯种大冤羊", desc: "莫名其妙的乐天派，被人卖了还在数钱。哪怕生活成了一团乱麻，也会微笑着说这是宇宙的考验。" },
        { icon: "🐒", name: "暴躁吗喽", desc: "精神状态在崩溃边缘反复横跳。日常口头禅是“毁灭吧赶紧的”，靠冰美式和一口仙气吊着命。" },
        { icon: "🐓", name: "尖叫土拨鸡", desc: "遇到屁大点事就能原地起跳尖叫，但在遇到真正危机的时候，反而能睡得比猪还死。" },
        { icon: "🐕", name: "顶级单身狗", desc: "对朋友仗义，但自己感情一塌糊涂。能给别人提供教科书级恋爱建议，自己却在深夜独自流泪。" },
        { icon: "🐖", name: "摆烂香猪", desc: "深谙“只要我躺得够平，资本就割不到我”。明明能做成很多事，但终究败给一句“今天床上有结界”。" }
    ];

    let currentQ = 0;
    let score = 0;

    function startTest() {
        document.getElementById('intro-box').style.display = 'none';
        renderQuestions();
        document.getElementById('q-0').classList.add('active');
    }

    function renderQuestions() {
        const container = document.getElementById('quiz-container');
        questions.forEach((qObj, index) => {
            const div = document.createElement('div');
            div.className = 'question-box';
            div.id = 'q-' + index;
            
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = qObj.q;
            div.appendChild(title);

            qObj.options.forEach((optText, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = (optIndex === 0 ? "A. " : "B. ") + optText;
                // 随意给选项赋分值，增加随机性
                const point = optIndex === 0 ? Math.floor(Math.random() * 3) + 1 : Math.floor(Math.random() * 5) + 3;
                btn.onclick = () => nextQuestion(index, point);
                div.appendChild(btn);
            });

            container.appendChild(div);
        });
    }

    function nextQuestion(index, points) {
        score += points;
        document.getElementById('q-' + index).classList.remove('active');
        if (index + 1 < questions.length) {
            document.getElementById('q-' + (index + 1)).classList.add('active');
        } else {
            showResult();
        }
    }

    function showResult() {
        // 利用取模运算随机映射到一个生肖
        const resultIndex = score % 12;
        const finalRes = results[resultIndex];
        
        document.getElementById('res-icon').innerText = finalRes.icon;
        document.getElementById('res-name').innerText = finalRes.name;
        document.getElementById('res-desc').innerText = finalRes.desc;
        
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
